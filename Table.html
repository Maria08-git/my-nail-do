<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Price Table – Ria's Nail Do</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="styles.css" rel="stylesheet">
    <style>
      table, th, td { border:1px solid violet; }
      th, td { padding: .6rem; }
    </style>
  </head>
  <body>
    <main class="container my-5">
      <h2>Price Table</h2>

      <div class="table-responsive">
        <table class="table" style="width:90%">
          <thead>
            <tr>
              <th>Nail service</th>
              <th>Price for regular customers</th>
              <th>Price for new customers</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td>Gel on tips</td>
              <td>P70</td>
              <td>P80</td>
            </tr>
            <tr>
              <td>Gel Overlay</td>
              <td>P60</td>
              <td>P70</td>
            </tr>
            <tr>
              <td>Polygel</td>
              <td>P60</td>
              <td>P70</td>
            </tr>
            <tr>
              <td>Soak off</td>
              <td>Free</td>
              <td>P30</td>
            </tr>
          </tbody>
        </table>
      </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="scripts.js"></script>
  </body>
</html>
