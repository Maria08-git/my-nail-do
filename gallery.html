  <main class="container my-5">
    <div class="text-center mb-4">
      <h1 class="section-title">Gallery</h1>
      <p class="text-muted">Tap an image to view full screen.</p>
    </div>

    <!-- Masonry-like grid -->
    <div class="row g-3 gallery-grid">
      <div class="col-6 col-md-4">
        <a class="lightbox d-block" href="images/Media(1).jpg" data-caption="Set 1"><img src="images/Media(1)-thumb.jpg" alt="Set 1" class="img-fluid rounded"></a>
      </div>
      <div class="col-6 col-md-4">
        <a class="lightbox d-block" href="images/Media(2).jpg" data-caption="Set 2"><img src="images/Media(2)-thumb.jpg" alt="Set 2" class="img-fluid rounded"></a>
      </div>
      <div class="col-6 col-md-4">
        <a class="lightbox d-block" href="images/Media(3).jpg" data-caption="Set 3"><img src="images/Media(3)-thumb.jpg" alt="Set 3" class="img-fluid rounded"></a>
      </div>
      <div class="col-6 col-md-4">
        <a class="lightbox d-block" href="images/Media(4).jpg" data-caption="Set 4"><img src="images/Media(4)-thumb.jpg" alt="Set 4" class="img-fluid rounded"></a>
      </div>
      <div class="col-6 col-md-4">
        <a class="lightbox d-block" href="images/Media(5).jpg" data-caption="Set 5"><img src="images/Media(5)-thumb.jpg" alt="Set 5" class="img-fluid rounded"></a>
      </div>
      <div class="col-6 col-md-4">
        <a class="lightbox d-block" href="images/nails jpg.jpg" data-caption="Set 6"><img src="images/nails jpg-thumb.jpg" alt="Set 6" class="img-fluid rounded"></a>
      </div>
    </div>
  </main>

  <!-- Lightbox Modal -->
  <div class="modal fade" id="lightboxModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-xl">
      <div class="modal-content bg-transparent border-0">
        <button type="button" class="btn-close btn-close-white ms-auto me-2 mt-2" data-bs-dismiss="modal" aria-label="Close"></button>
        <div class="text-center text-white mt-2"><img id="lightboxImage" src="" alt="" class="img-fluid"><div id="lightboxCaption" class="mt-2"></div></div>
      </div>
    </div>
  </div>

  <footer class="footer mt-5 py-4 bg-dark text-white">

      <div>© 2025 Ria's Corner</div>
      <div class="socials">
        <a class="text-white me-3" href="https://www.instagram.com/" target="_blank" rel="noopener noreferrer"><i class="bi bi-instagram"></i></a>
